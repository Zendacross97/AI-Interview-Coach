<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>Ai Interview Coach</h1>
            <h3>Login to your account</h3>
        </header>
        <div class="info-label">Login Info:</div>
            
        <form id="login" onsubmit="logIn(event)">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your email Id" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        
        <p class="login-message"></p>
        
        <div class="auth-footer">
            <p>Forgot your password? <a href="/user/forgotpassword">Reset Password</a></p>
            <p>Don't have an account? <a href="/user/signup">Sign Up</a></p>
        </div>
    </div>
