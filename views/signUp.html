<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>Ai Interview Coach</h1>
            <h3>Sign Up to create an account</h3>
        </header>
        <div class="info-label">SignUp Info:</div>
        
        <form id="signUp" method="post" action="#" onsubmit="signUp(event)">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your email Id" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit">Sign up</button>
        </form>
        
        <p class="signup-message"></p>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="/">Login</a></p>
            <p>Forgot your password? <a href="forgotpassword">Reset Password</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.8.4/axios.min.js"></script>
    <script src="/js/loginPublic.js"></script>
</body>
</html>
